# ================================================
# Forex Signal Bot — Config
# Data source: OANDA Practice API (free, real-time, unlimited)
# ================================================

oanda:
  api_token: "YOUR_OANDA_API_TOKEN"   # Railway Variable mein: OANDA_API_TOKEN

telegram:
  bot_token: "YOUR_BOT_TOKEN"           # @BotFather se
  chat_id: "YOUR_CHAT_ID"              # @userinfobot se

pairs:
  - "XAU/USD"     # Gold
  - "SPX"         # S&P 500
  - "NDX"         # Nasdaq 100

cascades:
  - htf: "4h"
    ltf: "15min"
  - htf: "2h"
    ltf: "30min"
  - htf: "1h"
    ltf: "5min"

strategy:
  displacement_multiplier: 1.5
  min_displacement_candles: 2
  swing_pivot_bars: 2
  signal_timeout_minutes: 15
  ob_mitigation: "candle_close"
  max_obs_per_pair: 5

# OANDA Practice API — generous rate limit, real-time data
# Har 5 minute scan safely chal sakta hai
scan_interval_seconds: 300

chart:
  output_dir: "charts"
  candles_to_show: 100
