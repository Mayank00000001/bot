# ================================================
# Forex Signal Bot — OANDA Config
# ================================================

oanda:
  api_token:  "YOUR_OANDA_API_TOKEN"    # Railway Variable: OANDA_API_TOKEN
  account_id: "YOUR_OANDA_ACCOUNT_ID"  # Railway Variable: OANDA_ACCOUNT_ID
  demo: true                            # true = demo account, false = live

telegram:
  bot_token: "YOUR_BOT_TOKEN"           # Railway Variable: TELEGRAM_BOT_TOKEN
  chat_id:   "YOUR_CHAT_ID"            # Railway Variable: TELEGRAM_CHAT_ID

pairs:
  - "XAU/USD"     # Gold
  - "SPX"         # S&P 500
  - "NDX"         # Nasdaq 100
  - "BTC/USD"     # Bitcoin

cascades:
  - htf: "4h"
    ltf: "15min"
  - htf: "2h"
    ltf: "30min"
  - htf: "1h"
    ltf: "5min"

strategy:
  displacement_multiplier: 1.5
  min_displacement_candles: 2
  swing_pivot_bars: 2
  signal_timeout_minutes: 15
  ob_mitigation: "candle_close"
  max_obs_per_pair: 5

scan_interval_seconds: 600   # 10 minutes

chart:
  output_dir: "charts"
  candles_to_show: 100
